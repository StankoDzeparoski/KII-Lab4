name: T3 CI Workflow

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print repository files
        run: ls -l

      - name: Setup Node.js (community action)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
